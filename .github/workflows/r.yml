name: R

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install system settings
        run: |
          echo "options(device='png')" >> ~/.Rprofile

      - name: Install dependencies
        shell: Rscript {0}
        run: |
          install.packages(c("remotes"))
          remotes::install_deps("gap", dependencies = TRUE)

      - name: Build package
        run: |
          R CMD build gap

      - name: Check package
        run: |
          R CMD check --no-manual gap_*.tar.gz
        env:
          _R_CHECK_FORCE_SUGGESTS_: false
          R_INSTALL_STAGED: false
