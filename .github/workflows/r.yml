name: R

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'

      - name: Install dependencies (no pak)
        run: |
          install.packages(c("rcmdcheck", "remotes"))
          remotes::install_deps("gap", dependencies = c("Depends", "Imports"))
        shell: Rscript {0}

      - name: Check
        run: rcmdcheck::rcmdcheck("gap", args = "--no-manual", error_on = "error")
        shell: Rscript {0}
