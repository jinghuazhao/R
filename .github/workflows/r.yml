name: R

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  check:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Set graphics device
        run: |
          echo "options(device = 'png')" >> ~/.Rprofile

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: gap
          extra-packages: |
            any::rcmdcheck

      - name: Check package
        run: |
          rcmdcheck::rcmdcheck(
            "gap",
            args = c("--no-manual"),
            error_on = "error"
          )
        shell: Rscript {0}
        env:
          _R_CHECK_FORCE_SUGGESTS_: false
          R_INSTALL_STAGED: false
